<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 595pt;
      height: 842pt;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      background: #1a3a5c;
    }
    .cover-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60pt 40pt;
      text-align: center;
    }
    .main-title {
      font-size: 42pt;
      font-weight: bold;
      color: white;
      margin-bottom: 20pt;
      letter-spacing: 4pt;
    }
    .subtitle {
      font-size: 18pt;
      color: #a0c4e8;
      margin-bottom: 60pt;
    }
    .divider {
      width: 120pt;
      height: 4pt;
      background: #e8b931;
      margin: 30pt 0;
    }
    .info-section {
      margin-top: 40pt;
    }
    .info-row {
      font-size: 12pt;
      color: #a0c4e8;
      margin: 8pt 0;
    }
    .footer {
      padding: 30pt 40pt;
      text-align: center;
    }
    .footer-text {
      color: #6b8cae;
      font-size: 10pt;
    }
  </style>
</head>
<body>
  <div class="cover-content">
    <p class="main-title">桥式起重机</p>
    <p class="subtitle">机械安全图集</p>
    <div class="divider"></div>
    <div class="info-section">
      <p class="info-row">依据标准：GB/T 6067.1-2010</p>
      <p class="info-row">TSG Q0002-2008</p>
    </div>
  </div>
  <div class="footer">
    <p class="footer-text">安全五点半出品</p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 595pt;
      height: 842pt;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }
    .header {
      background: #1a3a5c;
      padding: 20pt 30pt;
    }
    .header-title {
      font-size: 18pt;
      font-weight: bold;
      color: white;
    }
    .content {
      flex: 1;
      padding: 20pt 30pt;
      display: flex;
      flex-direction: column;
      gap: 16pt;
    }
    .funnel-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4pt;
    }
    .funnel-top {
      width: 200pt;
      height: 60pt;
      background: #4299e1;
      border-radius: 8pt 8pt 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11pt;
      font-weight: bold;
    }
    .funnel-mid {
      width: 140pt;
      height: 50pt;
      background: #3182ce;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11pt;
      font-weight: bold;
    }
    .funnel-ai {
      width: 100pt;
      height: 40pt;
      background: #e8b931;
      border-radius: 4pt;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a202c;
      font-size: 11pt;
      font-weight: bold;
      margin: 4pt 0;
    }
    .funnel-bottom {
      width: 80pt;
      height: 50pt;
      background: #38a169;
      border-radius: 0 0 8pt 8pt;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10pt;
    }
    .arrow-down {
      font-size: 20pt;
      color: #718096;
    }
    .future-box {
      background: #ebf8ff;
      border: 2pt solid #3182ce;
      border-radius: 8pt;
      padding: 16pt;
    }
    .future-title {
      font-size: 13pt;
      font-weight: bold;
      color: #2c5282;
      margin-bottom: 10pt;
    }
    .future-content {
      font-size: 10pt;
      line-height: 1.7;
      color: #2d3748;
    }
    .proof-box {
      background: #faf5ff;
      border-left: 4pt solid #805ad5;
      padding: 12pt 16pt;
      border-radius: 0 8pt 8pt 0;
    }
    .proof-title {
      font-size: 11pt;
      font-weight: bold;
      color: #553c9a;
      margin-bottom: 6pt;
    }
    .proof-content {
      font-size: 10pt;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="header-title">职责五：算法时代的隐患排查</p>
  </div>
  
  <div class="content">
    <div class="funnel-visual">
      <div class="funnel-top">📊 海量监测数据</div>
      <p class="arrow-down">↓</p>
      <div class="funnel-mid">🔍 AI智能过滤</div>
      <p class="arrow-down">↓</p>
      <div class="funnel-ai">🤖 AI筛选层</p>
      <p class="arrow-down">↓</p>
      <div class="funnel-bottom">👤 人类复核<br/>高价值预警</div>
    </div>
    
    <div class="future-box">
      <p class="future-title">🎯 未来排查模式</p>
      <p class="future-content">AI系统7×24小时持续监测人、机、环。AI在后台过滤低价值噪声，人类坐在数据大屏前复核筛选后的高价值预警，判断隐患等级。工作重心从<strong>比拼体力</strong>变为<strong>比拼对数据的专业判断力</strong>。</p>
    </div>
    
    <div class="proof-box">
      <p class="proof-title">✓ 可行性印证</p>
      <p class="proof-content">智能工厂AI质检准确率已超99%，多模态数据能捕捉肉眼不可见的异常苗头。</p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 595pt;
      height: 842pt;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }
    .header {
      background: #1a3a5c;
      padding: 24pt 30pt;
    }
    .header-title {
      font-size: 20pt;
      font-weight: bold;
      color: white;
    }
    .content {
      flex: 1;
      display: flex;
      padding: 0;
    }
    .left-side {
      flex: 1;
      background: #4a5568;
      padding: 30pt;
      display: flex;
      flex-direction: column;
    }
    .right-side {
      flex: 1;
      background: #f7fafc;
      padding: 30pt;
      display: flex;
      flex-direction: column;
    }
    .side-title {
      font-size: 14pt;
      font-weight: bold;
      margin-bottom: 20pt;
      padding: 8pt 12pt;
      border-radius: 4pt;
    }
    .left-title {
      color: #fed7d7;
      background: rgba(229,62,62,0.3);
    }
    .right-title {
      color: #1a3a5c;
      background: #bee3f8;
    }
    .content-text {
      font-size: 11pt;
      line-height: 1.8;
    }
    .left-text {
      color: #e2e8f0;
    }
    .right-text {
      color: #2d3748;
    }
    .highlight-box {
      background: #1a3a5c;
      padding: 15pt;
      border-radius: 8pt;
      margin-top: 20pt;
    }
    .highlight-text {
      color: #e8b931;
      font-size: 13pt;
      font-weight: bold;
      text-align: center;
    }
    .icon-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48pt;
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="header-title">现状与破局：我们为什么需要改变？</p>
  </div>
  
  <div class="content">
    <div class="left-side">
      <p class="side-title left-title">现状的痛</p>
      <div class="icon-area">📁😫</div>
      <p class="content-text left-text">天天跑现场查隐患，被台账压得喘不过气；抓违章常引发冲突，成了全公司最不受待见的人。</p>
    </div>
    
    <div class="right-side">
      <p class="side-title right-title">未来的变</p>
      <div class="icon-area">🤖⬆️</div>
      <p class="content-text right-text">彻底摆脱"安全警察"的尴尬身份，走向业务深处。</p>
      
      <div class="highlight-box">
        <p class="highlight-text">新身份：紫领安全工长<br/>既懂安全又精通AI调教</p>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 595pt;
      height: 842pt;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      background: #1a3a5c;
    }
    .cover-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60pt 40pt;
      text-align: center;
    }
    .main-title {
      font-size: 28pt;
      font-weight: bold;
      color: white;
      margin-bottom: 20pt;
      line-height: 1.4;
    }
    .subtitle {
      font-size: 16pt;
      color: #a0c4e8;
      margin-bottom: 60pt;
      font-style: italic;
    }
    .icon-helmet {
      width: 150pt;
      height: 150pt;
      border: 3pt solid #e8b931;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 60pt;
      background: rgba(232,185,49,0.1);
    }
    .icon-text {
      font-size: 60pt;
      color: #e8b931;
    }
    .footer {
      padding: 30pt 40pt;
      text-align: center;
    }
    .author {
      font-size: 14pt;
      color: white;
      margin-bottom: 8pt;
    }
    .date {
      font-size: 12pt;
      color: #6b8cae;
    }
  </style>
</head>
<body>
  <div class="cover-content">
    <div class="icon-helmet">
      <p class="icon-text">AI</p>
    </div>
    <p class="main-title">1000天后的安全生产管理<br/>从"安全警察"到"AI工长"</p>
    <p class="subtitle">破局"憋屈"现状，拥抱AI时代的紫领新身份</p>
  </div>
  
  <div class="footer">
    <p class="author">唐磊</p>
    <p class="date">2026年3月</p>
  </div>
</body>
</html>

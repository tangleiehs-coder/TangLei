<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 595pt;
      height: 842pt;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      background: #1a3a5c;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40pt;
      text-align: center;
    }
    .main-title {
      font-size: 32pt;
      font-weight: bold;
      color: white;
      margin-bottom: 40pt;
      line-height: 1.4;
    }
    .handshake-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20pt;
      margin-bottom: 40pt;
    }
    .robot-hand {
      font-size: 60pt;
    }
    .human-hand {
      font-size: 60pt;
      position: relative;
    }
    .heart-icon {
      position: absolute;
      top: -20pt;
      right: -10pt;
      font-size: 24pt;
      color: #e8b931;
    }
    .divider {
      width: 100pt;
      height: 4pt;
      background: #e8b931;
      margin: 30pt 0;
    }
    .key-message {
      background: rgba(255,255,255,0.1);
      border-radius: 12pt;
      padding: 24pt;
      margin-bottom: 30pt;
    }
    .message-title {
      font-size: 16pt;
      font-weight: bold;
      color: #e8b931;
      margin-bottom: 16pt;
    }
    .message-content {
      font-size: 12pt;
      color: #e2e8f0;
      line-height: 1.8;
    }
    .action-box {
      background: #e8b931;
      border-radius: 8pt;
      padding: 16pt 30pt;
    }
    .action-title {
      font-size: 14pt;
      font-weight: bold;
      color: #1a202c;
      margin-bottom: 8pt;
    }
    .action-content {
      font-size: 11pt;
      color: #2d3748;
    }
    .footer {
      padding: 20pt;
      text-align: center;
    }
    .footer-text {
      color: #6b8cae;
      font-size: 10pt;
    }
  </style>
</head>
<body>
  <div class="content">
    <p class="main-title">终局：算法归机器，人心归人类</p>
    
    <div class="handshake-visual">
      <p class="robot-hand">🤖🤝</p>
      <div class="human-hand">
        🧑
        <span class="heart-icon">💛</span>
      </div>
    </div>
    
    <div class="key-message">
      <p class="message-title">这不仅是工具的升级，更是认知的升维</p>
      <p class="message-content">AI负责不知疲倦地<strong>"算"与"写"</strong>，人类站在网中央负责<strong>"判"与"担"</strong>。<br/>把精力还给真正重要的事情：经营人际信任、倾听真实声音、做有温度的微决策。</p>
    </div>
    
    <div class="action-box">
      <p class="action-title">🚀 下一步建议</p>
      <p class="action-content">不要等准备好了再出发！<br/>今天就找一件最烦的重复性工作，试着让AI替你做一遍。</p>
    </div>
  </div>
  
  <div class="footer">
    <p class="footer-text">感谢聆听 | 安全五点半</p>
  </div>
</body>
</html>
